sample:
  name: EL2GO Import Blob
  description: The EdgeLock 2GO import blob sample demonstrates how to import and optionally use offline provisioned blobs from flash
tests:
  sample.nxp_iot_agent.el2go_import_blob:
    extra_args:
      - OVERLAY_CONFIG="overlay-el2go-rw61x.conf"
    tags:
      - el2go
      - trusted-firmware-m
    platform_allow:
      - rd_rw612_bga/rw612/ns
      - frdm_rw612/rw612/ns
    harness: console
    harness_config:
      fixture: fixture_el2go
      type: multi_line
      regex:
        - "\\d+ blob\\(s\\) imported from flash successfully"
        - "Validate imported blobs"
        - "Cipher encrypt passed!"
        - "ECC sign passed!"
        - "Certificate in DER format:"
        - "Subject field in certificate is:CN=[^ \\n]+"
        - "Issuer field in certificate is:.*O=NXP"
        - "Public_key:\\s*[0-9A-Fa-f]{50,}"

  sample.nxp_iot_agent.el2go_import_blob_product_based:
    extra_args:
      - OVERLAY_CONFIG="overlay-el2go-rw61x.conf"
    tags:
      - el2go
      - trusted-firmware-m
    platform_allow:
      - rd_rw612_bga/rw612/ns
      - frdm_rw612/rw612/ns
    harness: console
    harness_config:
      fixture: fixture_el2go
      type: multi_line
      regex:
        - "\\d+ blob\\(s\\) imported from flash successfully"
        - "Validate imported blobs"
        - "Cipher encrypt passed!"
        - "ECC sign passed!"
        - "Certificate in DER format:"
        - "Subject field in certificate is:CN=[^ \\n]+"
        - "Issuer field in certificate is:.*O=NXP"
        - "Public_key:\\s*[0-9A-Fa-f]{50,}"